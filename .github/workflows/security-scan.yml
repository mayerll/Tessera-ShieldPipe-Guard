
name: ShieldPipe Security CI

on:
  push:
    # Trigger on every push to the current branch.
    branches: [ '**' ]
  pull_request:
    # Trigger on pull requests to any branch.
    branches: [ '**' ]

jobs:
  # Job 1: Unit Testing
  Validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest typer rich checkov semgrep
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Unit Tests
        run: python3 -m pytest tests/test_shieldpipe.py

  # Job 2: Security Scanning
  Scanning:
    needs: Validate  # Must match the case of the Job ID above
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        # Essential: main.py requires typer/rich to be installed in this runner
        run: |
          python -m pip install --upgrade pip
          pip install typer rich checkov semgrep
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create Reports Directory
        run: mkdir -p reports && chmod 777 reports

      - name: Scan Dockerfile
        run: python3 main.py scan ./tests/Dockerfile --json 2>&1 | tee reports/dockerfile-scan.json
        continue-on-error: true

      - name: Scan Terraform
        run: python3 main.py scan ./tests/main.tf --json 2>&1 | tee reports/terraform-scan.json
        continue-on-error: true

      - name: Scan Dependencies
        run: python3 main.py scan ./tests/requirements.txt --json 2>&1 | tee reports/dependencies-scan.json
        continue-on-error: true

      - name: Scan Container Image
        run: |
          docker pull python:3.9-slim
          python3 main.py scan python:3.9-slim --json 2>&1 | tee reports/image-scan.json
        continue-on-error: true

      - name: Debug Reports Output
        run: ls -lh reports/ && head -n 5 reports/*.json

      - name: Upload Raw Results
        uses: actions/upload-artifact@v4
        with:
          name: raw-reports
          path: reports/*.json

  # Job 3: Final Security Gate
  Enforcement:
    needs: Scanning  # Must match the case of the Job ID above
    runs-on: ubuntu-latest
    steps:
      - name: Download Reports
        uses: actions/download-artifact@v4
        with:
          name: raw-reports
          path: reports
          merge-multiple: true

      - name: Security Gate Check
        run: |
          # Recursively check for Critical or High risks in the downloaded JSON files
          if grep -rqE "CRITICAL|HIGH" reports/; then
            echo "Security Gate Failed: High-risk vulnerabilities detected"
            exit 1
          else
            echo "Security Gate Passed: Environment is safe"
          fi

