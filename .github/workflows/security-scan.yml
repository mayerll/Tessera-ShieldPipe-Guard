
name: ShieldPipe Security CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Unit Testing
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install pytest typer rich checkov semgrep
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Unit Tests
        run: python3 -m pytest tests/test_shieldpipe.py

  # Job 2: Security Scanning
  scanning:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Reports Directory
        run: mkdir -p reports && chmod 777 reports

      - name: Scan Dockerfile
        # Using 'tee' ensures output goes to file AND logs; 2>&1 catches errors
        run: python3 main.py scan ./tests/Dockerfile --json 2>&1 | tee reports/dockerfile-scan.json
        continue-on-error: true

      - name: Scan Terraform
        run: python3 main.py scan ./tests/main.tf --json 2>&1 | tee reports/terraform-scan.json
        continue-on-error: true

      - name: Scan Dependencies
        run: python3 main.py scan ./tests/requirements.txt --json 2>&1 | tee reports/dependencies-scan.json
        continue-on-error: true

      - name: Scan Container Image
        run: |
          docker pull python:3.9-slim
          python3 main.py scan python:3.9-slim --json 2>&1 | tee reports/image-scan.json
        continue-on-error: true

      - name: Debug Reports (Verify content)
        run: ls -lh reports/ && head -n 5 reports/*.json

      - name: Upload Raw Results
        uses: actions/upload-artifact@v4
        with:
          name: raw-reports
          path: reports/*.json

  # Job 3: Final Security Gate
  enforcement:
    needs: scanning
    runs-on: ubuntu-latest
    steps:
      - name: Download Reports
        uses: actions/download-artifact@v4
        with:
          name: raw-reports
          path: reports

      - name: Security Gate Check
        run: |
          # Use grep -E to catch findings in any of the captured JSON files
          if grep -qE "CRITICAL|HIGH" reports/*.json; then
            echo "Security Gate Failed: High-risk vulnerabilities detected"
            exit 1
          else
            echo "Security Gate Passed: Environment is safe"
          fi

