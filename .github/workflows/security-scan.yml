
name: ShieldPipe Security CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Initialize
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest typer rich checkov semgrep
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 2. Validation Phase (Unit Tests)
      - name: Run Unit Tests (Pytest)
        id: unit_tests
        run: python3 -m pytest tests/test_shieldpipe.py

      # 3. Preparation Phase
      - name: Initialize Report Directory
        run: mkdir -p reports

      # 4. Scanning Phase (Individual Targets)
      - name: Scan Dockerfile
        run: python3 main.py scan ./tests/Dockerfile --json > reports/dockerfile-scan.json
        continue-on-error: true

      # This ensures we pull the image first to avoid timeout in the next step
      - name: Pull Base Image for Scan
        run: docker pull python:3.9-slim

      - name: Scan Terraform Files
        run: python3 main.py scan ./tests/main.tf --json > reports/terraform-scan.json
        continue-on-error: true

      - name: Scan Python Dependencies
        run: python3 main.py scan ./tests/requirements.txt --json > reports/dependencies-scan.json
        continue-on-error: true

      - name: Scan Container Image
        run: python3 main.py scan python:3.9-slim --json > reports/image-scan.json
        continue-on-error: true

      # 5. Enforcement Phase (Gatekeeper)
      - name: Security Gate (Critical/High Check)
        id: security_gate
        run: |
          if grep -qE "CRITICAL|HIGH" reports/*.json; then
            echo "Security Gate Failed: High-risk vulnerabilities detected"
            exit 1
          else
            echo "Security Gate Passed: Environment is safe"
          fi

      # 6. Archive Phase
      - name: Upload Scan Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shieldpipe-reports
          path: reports/*.json

