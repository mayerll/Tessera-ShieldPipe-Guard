
name: ShieldPipe Security CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Unit Testing
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install pytest typer rich checkov semgrep
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Unit Tests
        run: python3 -m pytest tests/test_shieldpipe.py

  # Job 2: Security Scanning (Runs only if validation passes)
  scanning:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Reports Directory
        run: mkdir -p reports

      - name: Scan Dockerfile
        run: python3 main.py scan ./tests/Dockerfile --json > reports/dockerfile-scan.json
        continue-on-error: true

      - name: Scan Terraform
        run: python3 main.py scan ./tests/main.tf --json > reports/terraform-scan.json
        continue-on-error: true

      - name: Scan Dependencies
        run: python3 main.py scan ./tests/requirements.txt --json > reports/dependencies-scan.json
        continue-on-error: true

      - name: Scan Container Image
        run: |
          docker pull python:3.9-slim
          python3 main.py scan python:3.9-slim --json > reports/image-scan.json
        continue-on-error: true

      - name: Upload Raw Results
        uses: actions/upload-artifact@v4
        with:
          name: raw-reports
          path: reports/*.json

  # Job 3: Final Security Gate & Reporting
  enforcement:
    needs: scanning
    runs-on: ubuntu-latest
    steps:
      - name: Download Reports
        uses: actions/download-artifact@v4
        with:
          name: raw-reports
          path: reports

      - name: Security Gate Check
        run: |
          if grep -qE "CRITICAL|HIGH" reports/*.json; then
            echo "Security Gate Failed: High-risk vulnerabilities detected"
            exit 1
          else
            echo "Security Gate Passed: Environment is safe"
          fi

      - name: Publish Final Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ChangE-Final-Security-Reports
          path: reports/*.json

