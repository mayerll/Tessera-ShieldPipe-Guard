name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip3 install -r requirements.txt
          pip3 install checkov semgrep

      - name: Run ShieldPipe Scan (IaC)
        run: python3 main.py scan ./tests/main.tf --json > scan-results.json

      - name: Verify Results
        run: |
          if grep -q "HIGH" scan-results.json; then
            echo "High severity vulnerabilities found!"
            exit 1
          fi

