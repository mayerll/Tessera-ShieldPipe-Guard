
rules:

# Fix 1: S3 public bucket ACL
- id: terraform-s3-no-public-acl
  languages:
    - terraform
  message: Remove public-read ACL
  severity: ERROR

  pattern: |
    acl = "public-read"

  fix: |
    acl = "private"


# Fix 2: Restrict SSH ingress
- id: terraform-no-open-ssh
  languages:
    - terraform
  message: Restrict SSH access
  severity: ERROR

  pattern: |
    cidr_blocks = ["0.0.0.0/0"]

  fix: |
    cidr_blocks = ["10.0.0.0/16"]
