
rules:
  - id: fix-s3-public-read
    patterns:
      - pattern: acl = $VALUE
      - metavariable-regex:
          metavariable: $VALUE
          regex: ".*public-read.*"
    fix: acl = "private"
    message: "Changing public S3 ACL to private."
    severity: WARNING
    languages: [hcl]

  - id: fix-docker-root
    patterns:
      - pattern: USER root
    fix: USER node
    message: "Switching root user to 'node' user."
    severity: WARNING
    languages: [dockerfile]

